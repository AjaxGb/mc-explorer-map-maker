<!DOCTYPE html>
<html>
<head>
	<title>Minecraft Exploration Map Maker</title>
	<link rel="shortcut icon" href="favicon.png" type="image/png" sizes="16x16">
	<link rel="stylesheet" type="text/css" href="main.css">
    <script type="module" src="main.js"></script>
</head>
<body>
    <main>
        <div id="map-bg">
            <canvas id="map-output" width="128" height="128"></canvas>
        </div>
        <p>
            Click to draw. Hold shift to erase. Scroll to change brush size.
            <br>
            (Brush: <span id="brush-size">5</span>px)
        </p>
        <p>
            <input id="invert-water" type="button" value="Invert water">
            <input id="load-water" type="button" value="Load water mask">
            <input id="save-water" type="button" value="Save water mask">
        </p>
        <p>
            <input id="save-nbt" type="button" value="Save map NBT">
            Center
            <label>X: <input id="center-x" type="number" step="1" value="0"></label>
            <label>Z: <input id="center-z" type="number" step="1" value="0"></label>
        </p>
    </main>
</body>
</html>
